name: Build Windows Executable

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        build_type: [gpu, cpu]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build Executable (${{ matrix.build_type }})
      run: |
        python scripts/build_exe.py --type ${{ matrix.build_type }} --ci
        
    - name: Zip Executable
      shell: pwsh
      run: |
        Compress-Archive -Path dist/TransformMovieToText\* -DestinationPath TransformMovieToText-Windows-${{ matrix.build_type }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TransformMovieToText-Windows-${{ matrix.build_type }}
        path: TransformMovieToText-Windows-${{ matrix.build_type }}.zip
        retention-days: 7

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: TransformMovieToText-Windows-${{ matrix.build_type }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

