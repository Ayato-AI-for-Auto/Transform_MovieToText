name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [gpu, cpu]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Build Executable (${{ matrix.build_type }})
      run: |
        python scripts/build_exe.py --type ${{ matrix.build_type }} --ci
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TransformMovieToText-Windows-${{ matrix.build_type }}
        path: dist/TransformMovieToText
        retention-days: 7
