name: Build Windows Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Package Application (Thin Client)
      shell: pwsh
      run: |
        # Create a clean release folder
        mkdir release_build
        
        # Copy necessary files for the thin client
        Copy-Item -Path "src" -Destination "release_build\src" -Recurse
        Copy-Item -Path "main.py" -Destination "release_build\"
        Copy-Item -Path "run.bat" -Destination "release_build\"
        Copy-Item -Path "pyproject.toml" -Destination "release_build\"
        Copy-Item -Path "README.md" -Destination "release_build\"
        Copy-Item -Path "LICENSE" -Destination "release_build\"
        
        # Zip the clean folder
        Compress-Archive -Path "release_build\*" -DestinationPath "TransformMovieToText-Windows-ThinClient.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TransformMovieToText-Windows-ThinClient
        path: TransformMovieToText-Windows-ThinClient.zip
        retention-days: 7

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: TransformMovieToText-Windows-ThinClient.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
