name: Luxurious CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-path: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install --system -e .[dev]

      - name: Ruff Check
        run: |
          ruff check src tests

      - name: Ruff Format Check
        run: |
          ruff format --check src tests

      - name: Run Tests
        # Note: ubuntu-latest will fail on soundcard/ffmpeg native features,
        # but pure logic tests should pass. We use a mock-heavy approach in CI.
        run: |
          pytest --junitxml=reports/junit-${{ matrix.os }}-${{ matrix.python-version }}.xml --cov=src --cov-report=xml:reports/coverage-${{ matrix.os }}-${{ matrix.python-version }}.xml

      - name: Upload Test and Coverage Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os }}-${{ matrix.python-version }}
          path: reports/*

  performance-audit:
    name: "Performance Audit (Win/3.10)"
    needs: lint-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          uv pip install --system -e .[dev]
      - name: Run Performance Benchmark
        run: |
          python tests/performance/benchmark_transcription.py > performance_report.txt
      - name: Upload Performance Report
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance_report.txt
