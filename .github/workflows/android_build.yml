name: Flet Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/android_build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and dependencies
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Flet CLI
        run: |
          uv pip install --system flet

      - name: Build APK (Flet)
        run: |
          # --yes を付与して SDK インストールの確認をスキップ
          flet build apk --yes --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-apk
          path: build/apk/*.apk
